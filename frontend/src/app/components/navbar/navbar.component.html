<nav class="navbar">
  <div class="navbar__logo">
    <a routerLink="/home">SUR<span>VER</span></a>
  </div>

  <div class="navbar__links">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
    <a routerLink="/catalogo" routerLinkActive="active">Catálogo</a>
    <a routerLink="/nosotros" routerLinkActive="active">Nosotros</a>
    <a routerLink="/contacto" routerLinkActive="active">Contacto</a>
  </div>

  <div class="navbar__right">
    <div class="navbar__session" *ngIf="isLoggedIn">
      <span>Sesión iniciada como <em>{{ currentUser!.username }}</em></span>
    </div>

    <div class="navbar__actions">
      <button mat-icon-button (click)="toggleDarkMode()" class="navbar__toggle">
        <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <div class="navbar__badge-wrap">
        <button mat-icon-button routerLink="/favoritos">
          <mat-icon>favorite_border</mat-icon>
        </button>
        <span class="navbar__badge" *ngIf="favCount > 0">{{ formatBadge(favCount) }}</span>
      </div>

      <div class="cart-wrap navbar__badge-wrap"
        (mouseenter)="onCartHover()"
        (mouseleave)="showCart.set(false)">
        <button mat-icon-button routerLink="/carrito">
          <mat-icon>shopping_bag</mat-icon>
        </button>
        <span class="navbar__badge" *ngIf="cartCount > 0">{{ formatBadge(cartCount) }}</span>
        <div class="cart-dropdown" *ngIf="showCart()">
          <app-mini-carrito />
        </div>
      </div>

      <button mat-icon-button routerLink="/auth" *ngIf="!isLoggedIn">
        <mat-icon>person</mat-icon>
      </button>

      <button mat-icon-button routerLink="/perfil" *ngIf="isLoggedIn">
        <mat-icon>person</mat-icon>
      </button>
    </div>
  </div>
</nav>
