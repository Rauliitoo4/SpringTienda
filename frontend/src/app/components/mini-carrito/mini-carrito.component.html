<div class="mini-cart">
  <div class="mini-cart__header">
    <span class="mini-cart__title">Carrito</span>
    <span class="mini-cart__count">{{ items.length }} artículos</span>
  </div>

  <div class="mini-cart__items">
    <div class="mini-cart__item" *ngFor="let item of items">
      <div class="mini-cart__item-image"></div>
      <div class="mini-cart__item-info">
        <div class="mini-cart__item-name">{{ item.name }}</div>
        <div class="mini-cart__item-meta">Talla {{ item.size }} · {{ item.quantity }} ud</div>
      </div>
      <div class="mini-cart__item-price">{{ item.price * item.quantity | number:'1.2-2' }} €</div>
    </div>
  </div>

  <div class="mini-cart__footer">
    <div class="mini-cart__total">
      <span>total</span>
      <span class="mini-cart__total-price">{{ total | number:'1.2-2' }} €</span>
    </div>
    <button mat-flat-button routerLink="/carrito" class="mini-cart__btn">
      ver carrito completo
    </button>
  </div>
</div>
