<section class="hero">
  <span class="hero__tag">NUEVA COLECCIÓN SS26</span>
  <h1 class="hero__title">Prendas que definen <em>tu estilo</em></h1>
  <p class="hero__subtitle">Diseños limpios para el día a día. Materiales sostenibles, siluetas atemporales.</p>
  <div class="hero__cta">
    <button mat-flat-button routerLink="/catalogo" class="hero__btn-primary">ver catálogo</button>
    <button mat-stroked-button routerLink="/nosotros" class="hero__btn-ghost">sobre nosotros</button>
  </div>
</section>

<div class="filters">
  <div class="filters__pills">
    <button class="pill" [class.active]="selectedFilter() === 'todo'" (click)="setFilter('todo')">Todo</button>
    <button class="pill" [class.active]="selectedFilter() === 'camisetas'" (click)="setFilter('camisetas')">Camisetas</button>
    <button class="pill" [class.active]="selectedFilter() === 'pantalones'" (click)="setFilter('pantalones')">Pantalones</button>
    <button class="pill" [class.active]="selectedFilter() === 'sudaderas'" (click)="setFilter('sudaderas')">Sudaderas</button>
    <button class="pill" [class.active]="selectedFilter() === 'chaquetas'" (click)="setFilter('chaquetas')">Chaquetas</button>
  </div>
  <mat-form-field appearance="outline" class="filters__sort">
    <mat-select [(ngModel)]="selectedSort" disableOptionCentering panelClass="sort-panel">
      <mat-option value="relevantes">Más relevantes</mat-option>
      <mat-option value="precio-asc">Precio: menor a mayor</mat-option>
      <mat-option value="precio-desc">Precio: mayor a menor</mat-option>
      <mat-option value="novedades">Novedades</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<div class="catalog">
  <div class="catalog__card" *ngFor="let i of [1,2,3,4,5,6]">
    <div class="catalog__image">
      <span class="catalog__badge catalog__badge--new">NUEVO</span>
      <button class="catalog__wishlist">
        <mat-icon>favorite_border</mat-icon>
      </button>
    </div>
    <div class="catalog__info">
      <div class="catalog__name">Camiseta lino oversize</div>
      <div class="catalog__cat">CAMISETAS</div>
      <div class="catalog__price">
        <span class="catalog__price-current">39,95 €</span>
      </div>
      <button mat-stroked-button class="catalog__add-btn">añadir al carrito</button>
    </div>
  </div>
</div>
