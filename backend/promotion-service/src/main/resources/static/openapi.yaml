openapi: 3.0.3
info:
  title: Promotion Service API
  description: Microservicio de gestión de promociones
  version: 1.0.0

servers:
  - url: http://localhost:8084
    description: Local

tags:
  - name: Promociones
    description: Operaciones sobre promociones

paths:

  /promociones:
    get:
      tags:
        - Promociones
      summary: Obtener todas las promociones
      operationId: getAllPromotions
      responses:
        "200":
          description: Lista de promociones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromotionResponse"

    post:
      tags:
        - Promociones
      summary: Crear promoción
      operationId: createPromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionRequest"
      responses:
        "201":
          description: Promoción creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"

  /promociones/{id}:
    get:
      tags:
        - Promociones
      summary: Obtener promoción por ID
      operationId: getPromotionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promoción encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "404":
          description: Promoción no encontrada

    put:
      tags:
        - Promociones
      summary: Actualizar promoción
      operationId: updatePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionRequest"
      responses:
        "200":
          description: Promoción actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "404":
          description: Promoción no encontrada

    delete:
      tags:
        - Promociones
      summary: Eliminar promoción
      operationId: deletePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Promoción eliminada
        "404":
          description: Promoción no encontrada

components:
  schemas:

    PromotionRequest:
      type: object
      properties:
        discount:
          type: number
          format: double
        description:
          type: string

    PromotionResponse:
      type: object
      properties:
        id:
          type: integer
        discount:
          type: number
          format: double
        description:
          type: string