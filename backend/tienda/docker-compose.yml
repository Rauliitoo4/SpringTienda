services:
  postgres:
    image: postgres:17
    container_name: tienda_postgres
    environment:
      POSTGRES_DB: tienda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: tienda_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/tienda
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: admin123
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/tienda
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: admin123
    depends_on:
      - postgres

volumes:
  postgres_data: