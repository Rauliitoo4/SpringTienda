openapi: 3.0.3
info:
  title: User Service API
  description: Microservicio de gestión de usuarios, autenticación y favoritos
  version: 1.0.0

servers:
  - url: http://localhost:8083
    description: Local

tags:
  - name: Usuarios
    description: Operaciones sobre usuarios
  - name: Favoritos
    description: Gestión de productos favoritos de un usuario
  - name: Auth
    description: Autenticación

paths:

  /usuarios:
    get:
      tags:
        - Usuarios
      summary: Obtener todos los usuarios
      operationId: getAllUsers
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"

    post:
      tags:
        - Usuarios
      summary: Crear usuario
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario no encontrado

    put:
      tags:
        - Usuarios
      summary: Actualizar usuario
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario no encontrado

    delete:
      tags:
        - Usuarios
      summary: Eliminar usuario
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Usuario eliminado
        "404":
          description: Usuario no encontrado

  /usuarios/{userId}/favoritos/{productId}:
    post:
      tags:
        - Favoritos
      summary: Añadir producto a favoritos
      operationId: addFavorito
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorito añadido, devuelve el usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario o producto no encontrado

    delete:
      tags:
        - Favoritos
      summary: Eliminar producto de favoritos
      operationId: removeFavorito
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorito eliminado, devuelve el usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario o producto no encontrado

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login de usuario
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login correcto, devuelve el usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Credenciales incorrectas

components:
  schemas:

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserRequest:
      type: object
      properties:
        name:
          type: string
        lastname:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        lastname:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        carritoId:
          type: integer
        favoritoIds:
          type: array
          items:
            type: integer