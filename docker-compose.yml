version: '3.8'

services:

  # BASES DE DATOS

  product-db:
    image: postgres:17
    container_name: product-db
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  promotion-db:
    image: postgres:17
    container_name: promotion-db
    environment:
      POSTGRES_DB: promotion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - promotion-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  carrito-db:
    image: postgres:17
    container_name: carrito-db
    environment:
      POSTGRES_DB: carrito_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - carrito-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # KEYCLOAK

  keycloak-db:
    image: postgres:17
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5439:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
    ports:
      - "9090:9090"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # MICROSERVICIOS

  product-service:
    build:
      context: ./backend/product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://product-db:5432/product_db
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://product-db:5432/product_db
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://localhost:9090/realms/tienda
      KEYCLOAK_JWK_SET_URI: http://keycloak:9090/realms/tienda/protocol/openid-connect/certs
    depends_on:
      product-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  promotion-service:
    build:
      context: ./backend/promotion-service
    container_name: promotion-service
    ports:
      - "8084:8084"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://promotion-db:5432/promotion_db
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://promotion-db:5432/promotion_db
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://localhost:9090/realms/tienda
      KEYCLOAK_JWK_SET_URI: http://keycloak:9090/realms/tienda/protocol/openid-connect/certs
    depends_on:
      promotion-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  carrito-service:
    build:
      context: ./backend/carrito-service
    container_name: carrito-service
    ports:
      - "8082:8082"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://carrito-db:5432/carrito_db
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://carrito-db:5432/carrito_db
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://localhost:9090/realms/tienda
      KEYCLOAK_JWK_SET_URI: http://keycloak:9090/realms/tienda/protocol/openid-connect/certs
    depends_on:
      carrito-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  user-service:
    build:
      context: ./backend/user-service
    container_name: user-service
    ports:
      - "8083:8083"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://user-db:5432/user_db
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://localhost:9090/realms/tienda
      KEYCLOAK_JWK_SET_URI: http://keycloak:9090/realms/tienda/protocol/openid-connect/certs
    depends_on:
      user-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # API GATEWAY - KONG

  kong-db:
    image: postgres:17
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5437:5432"
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:2.8
    container_name: kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    depends_on:
      kong-db:
        condition: service_healthy
    restart: on-failure

  kong:
    image: kong:2.8
    container_name: kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8080:8000"
      - "8001:8001"
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    restart: on-failure

  # KONGA - UI para Kong

  konga-db:
    image: postgres:9.6
    container_name: konga-db
    environment:
      POSTGRES_DB: konga
      POSTGRES_USER: konga
      POSTGRES_PASSWORD: konga
    ports:
      - "5438:5432"
    volumes:
      - konga-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konga"]
      interval: 5s
      timeout: 5s
      retries: 5

  konga-prepare:
    image: pantsel/konga
    container_name: konga-prepare
    command: "-c prepare -a postgres -u postgresql://konga:konga@konga-db:5432/konga"
    volumes:
      - konga-prepare-data:/app/kongadata
    depends_on:
      konga-db:
        condition: service_healthy
    restart: on-failure

  konga:
    image: pantsel/konga
    container_name: konga
    environment:
      NODE_ENV: production
      DB_ADAPTER: postgres
      DB_HOST: konga-db
      DB_PORT: 5432
      DB_USER: konga
      DB_PASSWORD: konga
      DB_DATABASE: konga
      TOKEN_SECRET: secreto123
    volumes:
      - konga-data:/app/kongadata
    ports:
      - "1337:1337"
    depends_on:
      konga-db:
        condition: service_healthy
      konga-prepare:
        condition: service_completed_successfully
      kong:
        condition: service_started

volumes:
  product-db-data:
  promotion-db-data:
  carrito-db-data:
  user-db-data:
  keycloak-db-data:
  kong-db-data:
  konga-db-data:
  konga-data:
  konga-prepare-data: