openapi: 3.0.3
info:
  title: Promotion Service API
  description: API para la gestión de promociones
  version: 1.0.0

servers:
  - url: http://localhost:8084
    description: Servidor local

tags:
  - name: Promotions
    description: Gestión de promociones

paths:

  /promotions:
    get:
      tags: [Promotions]
      summary: Obtener todas las promociones
      operationId: getAllPromotions
      responses:
        '200':
          description: Lista de promociones (puede estar vacía)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromotionResponse'

    post:
      tags: [Promotions]
      summary: Crear una nueva promoción
      operationId: createPromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionRequest'
            example:
              descripcion: Descuento de verano
              descuento: 10.0
      responses:
        '201':
          description: Promoción creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionResponse'
        '400':
          description: Datos de entrada inválidos

  /promotions/{id}:
    get:
      tags: [Promotions]
      summary: Obtener una promoción por ID
      operationId: getPromotionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Promoción encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionResponse'
        '404':
          description: Promoción no encontrada

    put:
      tags: [Promotions]
      summary: Actualizar una promoción
      operationId: updatePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionRequest'
            example:
              descripcion: Descuento actualizado
              descuento: 15.0
      responses:
        '204':
          description: Promoción actualizada exitosamente
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Promoción no encontrada

    delete:
      tags: [Promotions]
      summary: Eliminar una promoción
      operationId: deletePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Promoción eliminada exitosamente
        '404':
          description: Promoción no encontrada

components:

  schemas:

    PromotionRequest:
      type: object
      required: [descripcion, descuento]
      properties:
        descripcion:
          type: string
          example: Descuento de verano
        descuento:
          type: number
          format: double
          example: 10.0

    PromotionResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        descripcion:
          type: string
        descuento:
          type: number
          format: double