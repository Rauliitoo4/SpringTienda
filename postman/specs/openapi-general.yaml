openapi: 3.0.3
info:
  title: SpringTienda API
  description: |
    API general de SpringTienda. Agrega todos los microservicios a través del API Gateway Kong.

    ## Microservicios
    - **product-service** (8081) → `/productos`
    - **promotion-service** (8084) → `/promociones`
    - **carrito-service** (8082) → `/carritos`, `/lineas`
    - **user-service** (8083) → `/usuarios`, `/auth`

    ## Comunicación interna
    - `carrito-service` consulta `product-service` para obtener datos del producto en cada línea
    - `product-service` consulta `promotion-service` para calcular el precio final
    - `user-service` llama a `carrito-service` para crear el carrito al registrar un usuario
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Kong API Gateway

tags:
  - name: Productos
    description: Gestión de productos
  - name: Promociones
    description: Gestión de promociones
  - name: Carritos
    description: Gestión de carritos
  - name: Líneas
    description: Gestión de líneas de carrito
  - name: Usuarios
    description: Gestión de usuarios
  - name: Favoritos
    description: Gestión de favoritos de un usuario
  - name: Auth
    description: Autenticación

paths:

  # ─────────────────────────────────────────
  # PRODUCT SERVICE
  # ─────────────────────────────────────────

  /productos:
    get:
      tags:
        - Productos
      summary: Obtener todos los productos
      operationId: getAllProducts
      responses:
        "200":
          description: Lista de productos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"

    post:
      tags:
        - Productos
      summary: Crear producto
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "201":
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"

  /productos/{id}:
    get:
      tags:
        - Productos
      summary: Obtener producto por ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto no encontrado

    put:
      tags:
        - Productos
      summary: Actualizar producto
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "200":
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto no encontrado

    delete:
      tags:
        - Productos
      summary: Eliminar producto
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Producto eliminado
        "404":
          description: Producto no encontrado

  /productos/{productoID}/promociones/{promocionID}:
    post:
      tags:
        - Productos
      summary: Añadir promoción a un producto
      operationId: addPromotion
      parameters:
        - name: productoID
          in: path
          required: true
          schema:
            type: integer
        - name: promocionID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promoción añadida, devuelve el producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto o promoción no encontrado

    delete:
      tags:
        - Productos
      summary: Eliminar promoción de un producto
      operationId: removePromotion
      parameters:
        - name: productoID
          in: path
          required: true
          schema:
            type: integer
        - name: promocionID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promoción eliminada, devuelve el producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto o promoción no encontrado

  # ─────────────────────────────────────────
  # PROMOTION SERVICE
  # ─────────────────────────────────────────

  /promociones:
    get:
      tags:
        - Promociones
      summary: Obtener todas las promociones
      operationId: getAllPromotions
      responses:
        "200":
          description: Lista de promociones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromotionResponse"

    post:
      tags:
        - Promociones
      summary: Crear promoción
      operationId: createPromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionRequest"
      responses:
        "201":
          description: Promoción creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"

  /promociones/{id}:
    get:
      tags:
        - Promociones
      summary: Obtener promoción por ID
      operationId: getPromotionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promoción encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "404":
          description: Promoción no encontrada

    put:
      tags:
        - Promociones
      summary: Actualizar promoción
      operationId: updatePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionRequest"
      responses:
        "200":
          description: Promoción actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "404":
          description: Promoción no encontrada

    delete:
      tags:
        - Promociones
      summary: Eliminar promoción
      operationId: deletePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Promoción eliminada
        "404":
          description: Promoción no encontrada

  # ─────────────────────────────────────────
  # CARRITO SERVICE
  # ─────────────────────────────────────────

  /carritos:
    post:
      tags:
        - Carritos
      summary: Crear carrito
      description: Crea un nuevo carrito vacío. Usado internamente por user-service.
      operationId: createCarrito
      responses:
        "201":
          description: Carrito creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarritoResponse"

  /carritos/{id}:
    get:
      tags:
        - Carritos
      summary: Obtener carrito por ID
      operationId: getCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Carrito encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarritoResponse"
        "404":
          description: Carrito no encontrado

  /carritos/{carritoId}/productos:
    post:
      tags:
        - Carritos
      summary: Añadir producto al carrito
      operationId: addProductToCarrito
      parameters:
        - name: carritoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductToCarritoRequest"
      responses:
        "200":
          description: Producto añadido, devuelve el carrito actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarritoResponse"
        "404":
          description: Carrito o producto no encontrado

  /lineas:
    get:
      tags:
        - Líneas
      summary: Obtener todas las líneas de carrito
      operationId: getAllLineas
      responses:
        "200":
          description: Lista de líneas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LineaCarritoResponse"

  /lineas/{id}:
    get:
      tags:
        - Líneas
      summary: Obtener línea de carrito por ID
      operationId: getLineaCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Línea encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineaCarritoResponse"
        "404":
          description: Línea no encontrada

    put:
      tags:
        - Líneas
      summary: Actualizar cantidad de una línea de carrito
      operationId: updateLineaCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLineaCarritoRequest"
      responses:
        "200":
          description: Línea actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineaCarritoResponse"
        "404":
          description: Línea no encontrada

    delete:
      tags:
        - Líneas
      summary: Eliminar línea de carrito
      operationId: deleteLineaCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Línea eliminada
        "404":
          description: Línea no encontrada

  # ─────────────────────────────────────────
  # USER SERVICE
  # ─────────────────────────────────────────

  /usuarios:
    get:
      tags:
        - Usuarios
      summary: Obtener todos los usuarios
      operationId: getAllUsers
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"

    post:
      tags:
        - Usuarios
      summary: Crear usuario
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario no encontrado

    put:
      tags:
        - Usuarios
      summary: Actualizar usuario
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario no encontrado

    delete:
      tags:
        - Usuarios
      summary: Eliminar usuario
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Usuario eliminado
        "404":
          description: Usuario no encontrado

  /usuarios/{userId}/favoritos/{productId}:
    post:
      tags:
        - Favoritos
      summary: Añadir producto a favoritos
      operationId: addFavorito
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorito añadido, devuelve el usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario o producto no encontrado

    delete:
      tags:
        - Favoritos
      summary: Eliminar producto de favoritos
      operationId: removeFavorito
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorito eliminado, devuelve el usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario o producto no encontrado

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login de usuario
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login correcto, devuelve el usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Credenciales incorrectas

components:
  schemas:

    # ── Product ──────────────────────────────
    ProductRequest:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
          format: double
        description:
          type: string
        material:
          type: string
        considerations:
          type: string
        imageUrl:
          type: string
        category:
          $ref: "#/components/schemas/Category"

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: double
        finalPrice:
          type: number
          format: double
        description:
          type: string
        material:
          type: string
        considerations:
          type: string
        imageUrl:
          type: string
        promotions:
          type: array
          items:
            $ref: "#/components/schemas/PromotionResponse"
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/Size"
        category:
          $ref: "#/components/schemas/Category"
        createdAt:
          type: string
          format: date-time

    # ── Promotion ────────────────────────────
    PromotionRequest:
      type: object
      properties:
        discount:
          type: number
          format: double
        description:
          type: string

    PromotionResponse:
      type: object
      properties:
        id:
          type: integer
        discount:
          type: number
          format: double
        description:
          type: string

    # ── Carrito ──────────────────────────────
    AddProductToCarritoRequest:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        size:
          $ref: "#/components/schemas/Size"

    UpdateLineaCarritoRequest:
      type: object
      properties:
        quantity:
          type: integer

    CarritoResponse:
      type: object
      properties:
        id:
          type: integer
        total:
          type: number
          format: double
        lineas:
          type: array
          items:
            $ref: "#/components/schemas/LineaCarritoResponse"

    LineaCarritoResponse:
      type: object
      properties:
        id:
          type: integer
        subtotal:
          type: number
          format: double
        quantity:
          type: integer
        size:
          $ref: "#/components/schemas/Size"
        carritoId:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/ProductResponse"

    # ── User ─────────────────────────────────
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserRequest:
      type: object
      properties:
        name:
          type: string
        lastname:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        lastname:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        carritoId:
          type: integer
        favoritoIds:
          type: array
          items:
            type: integer

    # ── Shared ───────────────────────────────
    Category:
      type: string
      enum:
        - CAMISETAS
        - SUDADERAS
        - PANTALONES
        - CHAQUETAS

    Size:
      type: string
      enum:
        - XS
        - S
        - M
        - L
        - XL